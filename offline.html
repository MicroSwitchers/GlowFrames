<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>GlowFrames - Offline</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100%;
            background: #0A0A0B;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        .container { max-width: 320px; padding: 32px 24px; }
        img { width: 72px; height: 72px; margin-bottom: 24px; border-radius: 16px; opacity: 0.9; }
        h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 12px; }
        p { font-size: 0.95rem; color: rgba(255,255,255,0.6); line-height: 1.5; margin-bottom: 28px; }
        button {
            background: #7C3AED;
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 14px 28px;
            font-size: 1rem;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="./icons/icon-192x192.png" alt="GlowFrames">
        <h1>You're Offline</h1>
        <p>GlowFrames needs a connection the first time it loads. Once loaded, it works fully offline.</p>
        <button onclick="window.location.reload()">Try Again</button>
    </div>
</body>
</html>
